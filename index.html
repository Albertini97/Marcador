<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marcador</title>
<link href="https://fonts.googleapis.com/css2?family=Black+Ops+One&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --panel: #12121a;
    --border: #1e1e2e;
  }

  body {
    background: var(--bg);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
    user-select: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── SETUP SCREEN ── */
  #setup-screen {
    position: relative; z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 40px;
    padding: 40px 20px;
    animation: fadeIn 0.4s ease;
  }

  .setup-title {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(2rem, 7vw, 3.5rem);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: #fff;
    text-align: center;
  }

  .setup-subtitle {
    font-size: 1.1rem;
    font-weight: 600;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.3);
    text-align: center;
    margin-top: -28px;
  }

  .player-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    max-width: 460px;
    width: 100%;
  }

  .num-card {
    aspect-ratio: 1;
    border-radius: 16px;
    background: var(--panel);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Black Ops One', cursive;
    font-size: clamp(1.8rem, 5vw, 2.5rem);
    color: rgba(255,255,255,0.3);
    cursor: pointer;
    transition: all 0.2s cubic-bezier(.22,1,.36,1);
  }

  .num-card:hover {
    transform: scale(1.06);
    border-color: rgba(255,255,255,0.2);
    color: #fff;
  }

  .num-card.selected {
    background: color-mix(in srgb, var(--nc) 15%, var(--panel));
    border-color: var(--nc);
    box-shadow: 0 0 30px color-mix(in srgb, var(--nc) 40%, transparent);
    color: var(--nc);
    transform: scale(1.08);
  }

  .num-card[data-n="2"] { --nc: #ff3c3c; }
  .num-card[data-n="3"] { --nc: #ffe033; }
  .num-card[data-n="4"] { --nc: #3cff8f; }
  .num-card[data-n="5"] { --nc: #00c8ff; }
  .num-card[data-n="6"] { --nc: #ff7aff; }
  .num-card[data-n="7"] { --nc: #ff8c3c; }
  .num-card[data-n="8"] { --nc: #a78bfa; }

  .start-btn {
    font-family: 'Black Ops One', cursive;
    font-size: 1.3rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    background: #fff;
    color: #0a0a0f;
    border: none;
    border-radius: 14px;
    padding: 18px 56px;
    cursor: pointer;
    transition: all 0.2s;
    opacity: 0.15;
    pointer-events: none;
  }

  .start-btn.ready {
    opacity: 1;
    pointer-events: all;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.3); }
    50%       { box-shadow: 0 0 0 14px rgba(255,255,255,0); }
  }

  .start-btn.ready:hover { transform: scale(1.04); }
  .start-btn.ready:active { transform: scale(0.97); }

  /* ── GAME SCREEN ── */
  #game-screen {
    display: none;
    position: relative; z-index: 1;
    width: min(98vw, 1100px);
    flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 16px 10px;
    animation: fadeIn 0.4s ease;
  }

  #game-screen.active { display: flex; }

  .game-back {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.18);
    cursor: pointer;
    transition: color 0.2s;
    align-self: flex-start;
    padding: 4px 0;
  }

  .game-back:hover { color: rgba(255,255,255,0.5); }

  .scoreboard {
    display: grid;
    width: 100%;
    gap: 10px;
  }

  .players-2 { grid-template-columns: 1fr 1fr; }
  .players-3 { grid-template-columns: repeat(3, 1fr); }
  .players-4 { grid-template-columns: repeat(2, 1fr); }
  .players-5 { grid-template-columns: repeat(3, 1fr); }
  .players-6 { grid-template-columns: repeat(3, 1fr); }
  .players-7 { grid-template-columns: repeat(4, 1fr); }
  .players-8 { grid-template-columns: repeat(4, 1fr); }

  @media (max-width: 600px) {
    .players-3, .players-5, .players-6 { grid-template-columns: repeat(2, 1fr); }
    .players-7, .players-8 { grid-template-columns: repeat(2, 1fr); }
  }

  .player {
    background: var(--panel);
    border-radius: 14px;
    padding: 20px 14px 16px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    border: 1px solid var(--border);
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.4s, border-color 0.4s;
  }

  .player::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--pc);
    opacity: 0.8;
  }

  .player.leading {
    box-shadow: 0 0 35px color-mix(in srgb, var(--pc) 40%, transparent);
    border-color: color-mix(in srgb, var(--pc) 25%, var(--border));
  }

  .player-name {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(0.85rem, 2.5vw, 1.2rem);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--pc);
    cursor: pointer;
    outline: none;
    border: none;
    background: transparent;
    text-align: center;
    padding: 3px 6px;
    border-radius: 6px;
    transition: background 0.2s;
    width: 100%;
  }

  .player-name:focus { background: rgba(255,255,255,0.06); }

  .score {
    font-family: 'Black Ops One', cursive;
    font-size: clamp(3rem, 10vw, 7rem);
    line-height: 1;
    color: #fff;
    text-shadow: 0 0 25px color-mix(in srgb, var(--pc) 60%, transparent);
  }

  .score.bump { animation: bump 0.25s cubic-bezier(.36,.07,.19,.97); }

  @keyframes bump {
    0%   { transform: scale(1); }
    40%  { transform: scale(1.2); }
    100% { transform: scale(1); }
  }

  .btn-row { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }

  .btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600;
    font-size: clamp(0.85rem, 2vw, 1.1rem);
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    cursor: pointer;
    transition: transform 0.1s;
    outline: none;
    white-space: nowrap;
  }

  .btn:active { transform: scale(0.9); }
  .btn-add { background: var(--pc); color: color-mix(in srgb, var(--pc) 20%, #000); }
  .btn-sub {
    background: rgba(255,255,255,0.07);
    color: rgba(255,255,255,0.45);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .btn-sub:hover { background: rgba(255,255,255,0.12); }

  .controls {
    display: flex; align-items: center; gap: 12px;
    width: 100%; justify-content: center; flex-wrap: wrap;
  }

  .ctrl-btn {
    font-family: 'Rajdhani', sans-serif;
    font-weight: 600; font-size: 0.9rem;
    letter-spacing: 0.1em; text-transform: uppercase;
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.35);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 8px; padding: 7px 18px;
    cursor: pointer; transition: all 0.2s;
  }

  .ctrl-btn:hover { background: rgba(255,255,255,0.1); color: rgba(255,255,255,0.7); }
  .ctrl-btn.danger:hover { background: rgba(255,60,60,0.12); border-color: rgba(255,60,60,0.4); color: #ff3c3c; }

  .history { width: 100%; max-height: 0; overflow: hidden; transition: max-height 0.4s ease; }
  .history.open { max-height: 180px; }
  .history-inner {
    display: flex; flex-direction: column; gap: 5px;
    padding: 8px 0 4px; overflow-y: auto; max-height: 160px;
  }

  .history-item {
    font-size: 0.85rem; font-weight: 600; letter-spacing: 0.05em;
    color: rgba(255,255,255,0.28); text-align: center; padding: 3px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
  }

  .toast {
    position: fixed; bottom: 28px; left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: #1e1e2e; border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.85); font-family: 'Rajdhani', sans-serif;
    font-size: 1rem; font-weight: 600; letter-spacing: 0.08em;
    padding: 11px 26px; border-radius: 50px; white-space: nowrap;
    transition: transform 0.35s cubic-bezier(.22,1,.36,1), opacity 0.35s;
    opacity: 0; z-index: 100; pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
</style>
</head>
<body>

<!-- SETUP -->
<div id="setup-screen">
  <div>
    <div class="setup-title">Marcador</div>
    <div class="setup-subtitle">¿Cuántos jugadores?</div>
  </div>

  <div class="player-grid">
    <div class="num-card" data-n="2">2</div>
    <div class="num-card" data-n="3">3</div>
    <div class="num-card" data-n="4">4</div>
    <div class="num-card" data-n="5">5</div>
    <div class="num-card" data-n="6">6</div>
    <div class="num-card" data-n="7">7</div>
    <div class="num-card" data-n="8">8</div>
  </div>

  <button class="start-btn" id="start-btn" onclick="startGame()">Empezar</button>
</div>

<!-- GAME -->
<div id="game-screen">
  <div class="game-back" onclick="goSetup()">← Cambiar jugadores</div>
  <div class="scoreboard" id="scoreboard"></div>
  <div class="controls">
    <button class="ctrl-btn" onclick="toggleHistory()">📋 Historial</button>
    <button class="ctrl-btn danger" onclick="resetScores()">↺ Reiniciar</button>
  </div>
  <div class="history" id="historyPanel">
    <div class="history-inner" id="historyList"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
  const COLORS = ['#ff3c3c','#00c8ff','#ffe033','#3cff8f','#ff7aff','#ff8c3c','#a78bfa','#3cffd1'];
  let numPlayers = 0, scores = [], gameHistory = [];

  document.querySelectorAll('.num-card').forEach(card => {
    card.addEventListener('click', () => {
      document.querySelectorAll('.num-card').forEach(c => c.classList.remove('selected'));
      card.classList.add('selected');
      numPlayers = parseInt(card.dataset.n);
      document.getElementById('start-btn').classList.add('ready');
    });
  });

  function startGame() {
    if (!numPlayers) return;
    scores = Array(numPlayers).fill(0);
    gameHistory = [];
    buildBoard();
    document.getElementById('setup-screen').style.display = 'none';
    document.getElementById('game-screen').classList.add('active');
    document.getElementById('historyPanel').classList.remove('open');
    updateHistory();
  }

  function goSetup() {
    document.getElementById('game-screen').classList.remove('active');
    const s = document.getElementById('setup-screen');
    s.style.display = 'flex';
    s.style.animation = 'none';
    void s.offsetWidth;
    s.style.animation = '';
  }

  function buildBoard() {
    const board = document.getElementById('scoreboard');
    board.innerHTML = '';
    board.className = `scoreboard players-${numPlayers}`;

    for (let i = 0; i < numPlayers; i++) {
      const color = COLORS[i];
      const n = i + 1;
      const panel = document.createElement('div');
      panel.className = 'player';
      panel.id = `panel${n}`;
      panel.style.setProperty('--pc', color);
      panel.innerHTML = `
        <input class="player-name" id="name${n}" value="Jugador ${n}" maxlength="14" spellcheck="false">
        <div class="score" id="score${n}">0</div>
        <div class="btn-row">
          <button class="btn btn-add" onclick="change(${n}, 2)">+2</button>
          <button class="btn btn-add" onclick="change(${n}, 1)">+1</button>
          <button class="btn btn-sub" onclick="change(${n}, -1)">−1</button>
        </div>`;
      board.appendChild(panel);
    }

    document.querySelectorAll('.player-name').forEach(el => {
      el.addEventListener('focus', () => el.select());
      el.addEventListener('keydown', e => { if (e.key === 'Enter') el.blur(); });
    });
  }

  function change(player, delta) {
    const i = player - 1;
    scores[i] = Math.max(0, scores[i] + delta);
    const el = document.getElementById('score' + player);
    el.textContent = scores[i];
    el.classList.remove('bump');
    void el.offsetWidth;
    el.classList.add('bump');

    const name = document.getElementById('name' + player).value || `Jugador ${player}`;
    const color = COLORS[i];
    const sign = delta > 0 ? '+' : '';
    gameHistory.push(`<span style="color:${color}">${name}</span> ${sign}${delta} → ${scores[i]}`);
    updateHistory();
    updateLeading();
  }

  function updateLeading() {
    const max = Math.max(...scores);
    for (let i = 1; i <= numPlayers; i++) {
      const panel = document.getElementById('panel' + i);
      if (scores[i-1] === max && max > 0) panel.classList.add('leading');
      else panel.classList.remove('leading');
    }
  }

  function updateHistory() {
    const list = document.getElementById('historyList');
    if (!gameHistory.length) {
      list.innerHTML = '<div class="history-item" style="color:rgba(255,255,255,0.15)">Sin movimientos aún</div>';
      return;
    }
    list.innerHTML = [...gameHistory].reverse().map(h => `<div class="history-item">${h}</div>`).join('');
  }

  function toggleHistory() {
    document.getElementById('historyPanel').classList.toggle('open');
  }

  function resetScores() {
    scores = Array(numPlayers).fill(0);
    gameHistory = [];
    for (let i = 1; i <= numPlayers; i++) {
      document.getElementById('score' + i).textContent = '0';
      document.getElementById('panel' + i).classList.remove('leading');
    }
    updateHistory();
    showToast('Puntuación reiniciada');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(t._timeout);
    t._timeout = setTimeout(() => t.classList.remove('show'), 2200);
  }
</script>
</body>
</html>
